<!DOCTYPE html>
<html lang="hi">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>धन्यवाद — Khichda Papad</title>
    <!-- Auto-redirect removed per request -->
    <style>
        :root {
            --saffron: #E8881A;
            --deep-red: #C0392B;
            --cream: #FDF6E3;
            --charcoal: #1A1A1A
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            font-family: system-ui, -apple-system, Segoe UI, Roboto, 'Khand', sans-serif;
            background: linear-gradient(180deg, #fffaf0 0%, #fff0dd 100%);
            color: var(--charcoal);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px
        }

        .card {
            max-width: 820px;
            width: 100%;
            background: linear-gradient(180deg, #fff 0%, #fffaf6 100%);
            border-radius: 12px;
            padding: 36px 28px;
            box-shadow: 0 18px 50px rgba(22, 16, 10, 0.12);
            border: 4px solid rgba(232, 136, 26, 0.08);
            text-align: center
        }

        .logo {
            display: inline-grid;
            place-items: center;
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--deep-red);
            color: #fff;
            font-weight: 900;
            font-size: 20px;
            margin: 0 auto 18px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.12)
        }

        h1 {
            font-size: 1.9rem;
            color: var(--deep-red);
            margin-bottom: 10px
        }

        p.lead {
            font-size: 1.05rem;
            color: #5b4a39;
            margin-bottom: 18px
        }

        p.note {
            font-size: 0.96rem;
            color: #4b3f35;
            margin-bottom: 22px
        }

        .cta-row {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap
        }

        .btn {
            background: var(--saffron);
            color: #fff;
            padding: 12px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 700
        }

        .btn.secondary {
            background: transparent;
            color: var(--deep-red);
            border: 2px solid var(--deep-red)
        }

        .small {
            font-size: 0.86rem;
            color: #6b5140;
            margin-top: 14px
        }

        @media (max-width:600px) {
            .card {
                padding: 22px
            }

            .logo {
                width: 56px;
                height: 56px
            }
        }
    </style>
</head>

<body>
    <main class="card" role="main">
        <div class="logo">BP</div>
        <h1>धन्यवाद! आपका ऑर्डर मिल गया।</h1>
        <p class="lead">जैसे ही आपका ऑर्डर पैक और भेजा जाएगा, हम आपको अपडेट कर देंगे।</p>
        <p class="note">हम 24 घंटे के भीतर आपसे संपर्क करेंगे — कृपया अपना फ़ोन पास रखें।</p>
 
    
    </main>
</body>

</html>
